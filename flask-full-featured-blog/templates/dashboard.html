<!-- below code means pls use layout.html as base template and fill in the blanks from content between block-body and endblock tag given below -->
{% extends "layout.html" %}
{% block body %}
<!-- Page Header-->
<header class="masthead" style="background-image: url({{ url_for('static', filename = 'assets/img/home-bg.jpg')}})">
    <div class="container position-relative px-4 px-lg-5">
        <div class="row gx-4 gx-lg-5 justify-content-center">
            <div class="col-md-10 col-lg-8 col-xl-7">
                <div class="site-heading">
                    <h1>Admin Panel</h1>
                    <span class="subheading">Manage Your Posts</span>
                </div>
            </div>
        </div>
    </div>
</header>
<!-- Main Content-->

<div class="container px-4 px-lg-5">
    <div class="row gx-4 gx-lg-5 justify-content-center">
        <div class="col-md-10 col-lg-8 col-xl-7">

            <h2>Basic Actions</h2>
            <a href = "edit/0"><button class="btn btn-primary text-uppercase">Add New Post</button>
            <a href = "/logout"><button class="btn btn-primary text-uppercase">Logout</button>

            <hr>
            <h2>File Uploader</h2>
            
            <form method ="post" action = "/uploader" enctype = "multipart/form-data">
                <input name = "file1" type = "file">
                <button class="btn btn-primary text-uppercase" type = "submit">Submit</button>
            </form>
            <hr>

          


            <h2>Edit Posts</h2>
            <table class="table">
                <thead>
                    <tr>
                        <th>Sno</th>
                        <th>Title</th>
                        <th>Date</th>
                        <th>Edit</th>
                        <th>Delete</th>
                    </tr>
                </thead>
                <tbody>

                    {% for post in posts %}

                    <tr>
                        <td>{{post.sno}}</td>
                        <td>{{post.date}}</td>
                        <td>{{post.title}}</td>
                        <td><a href = "/edit/{{post.sno}}"><button class="btn btn-primary text-uppercase">Edit</button></a></td>
                        <td><a href = "/delete/{{post.sno}}" ><button class="btn btn-primary text-uppercase">Delete</button></a></td>
                    </tr>
                    {% endfor %}

                </tbody>
            </table>

        </div>
    </div>
</div>


{% endblock %}
