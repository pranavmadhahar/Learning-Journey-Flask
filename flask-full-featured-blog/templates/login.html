<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .form-signin {
            max-width: 400px;
            /* Set a max width for the form */
            margin: auto;
            /* Center the form */
        }
    </style>

</head>



<body class="d-flex align-items-center py-4 bg-body-tertiary">
    <div class="form-signin w-100 m-auto mt-5">

        {% set fname = 'assets/img/' + params['login_img'] %}
        <form action="/dashboard" method="post">

            <div class="text-center">
                <img class="mb-4" src="{{ url_for('static', filename=fname)}}" alt="" width="72" height="57">
            </div>
            <h1 class="h3 mb-3 fw-normal text-center">Admin sign in</h1>
            {% if error %}
            <div class="text-center mb-2" style="color: red;">{{ error }}</div>
            {% endif %}
            <div class="row mb-3">
                <div class="col-12">
                    <div class="form-floating">
                        <input type="text" class="form-control" name='uname' id="uname" placeholder="name@example.com"
                            required>
                        <label for="uname">Username</label>
                    </div>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-12">
                    <div class="form-floating">
                        <input type="password" class="form-control" name="pass" id="pass" placeholder="Password"
                            required>
                        <label for="pass">Password</label>
                    </div>
                </div>
            </div>
            <button class="btn btn-primary w-100 py-2" type="submit">Sign in</button>
            <p class="mt-5 mb-3 text-body-secondary">&copy; {{params ["blog_name"]}} 2017–2025</p>
        </form>
        </main>
</body>

</html>
